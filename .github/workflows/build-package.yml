name: Build theme package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Komari-Theme-LuminaPlus-package
          path: |
            Komari-Theme-LuminaPlus-v*.zip
            preview.png

      - name: Resolve release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release-notes
        shell: bash
        run: |
          notes=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes" ]]; then
            notes=".github/release-notes/v1.1.4.md"
          fi
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Komari-Theme-LuminaPlus-v*.zip
            preview.png
          body_path: ${{ steps.release-notes.outputs.path }}
